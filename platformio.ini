[env:esp32wrover]
platform  = espressif32
board     = esp32wrover
framework = arduino

; Partition avec plus d'espace app (nécessaire avec les libs image)
board_build.partitions = huge_app.csv

lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
    adafruit/Adafruit GFX Library            @ ^1.11.9

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
    ; Optimisation vitesse (important pour le pipeline temps réel)
    -O2

monitor_speed = 115200
upload_speed  = 921600
